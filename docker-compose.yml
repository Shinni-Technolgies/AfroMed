services:
  afromed-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        - VITE_APP_VERSION
        - VITE_APP_NAME
        - VITE_APP_BASE_NAME
        - VITE_API_BASE_URL
    env_file: .env
    ports:
      - "3000:80"
    depends_on:
      afromed-server:
        condition: service_healthy
    restart: unless-stopped

  afromed-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
