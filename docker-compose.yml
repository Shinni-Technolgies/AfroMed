services:
  afromed-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        - VITE_APP_VERSION
        - VITE_APP_NAME
        - VITE_APP_BASE_NAME
        - VITE_API_BASE_URL
    env_file: .env
    ports:
      - "3002:80"
    depends_on:
      afromed-server:
        condition: service_healthy
    restart: unless-stopped

  afromed-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - default
      - afromed-db_default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  afromed-db_default:
    external: true
