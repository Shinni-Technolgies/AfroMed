services:
  afromed-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:80"
    depends_on:
      afromed-server:
        condition: service_healthy
    restart: unless-stopped

  afromed-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URI: postgresql://afromed:afromed@postgres:5432/afromed
      DATABASE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: afromed
      POSTGRES_PASSWORD: afromed
      POSTGRES_DB: afromed
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afromed"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
